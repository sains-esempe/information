<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server Status</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0f0f1a;
      font-family: 'Inter', sans-serif;
    }

    .pixel-font {
      font-family: 'Press Start 2P', monospace;
    }

    /* Pixel-art grass border */
    .grass-border {
      border-image: none;
      box-shadow:
        0 0 0 4px #5d9e3f,
        0 0 0 8px #4a7a30,
        0 0 0 12px #3d6326;
    }

    /* Dirt texture pattern */
    .dirt-bg {
      background-color: #7a5230;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(0,0,0,0.2) 1px, transparent 1px),
        radial-gradient(circle at 70% 60%, rgba(0,0,0,0.15) 1px, transparent 1px),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 8px 8px, 12px 12px, 6px 6px;
    }

    /* Pulsing green dot */
    @keyframes pulse-green {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    }
    .pulse-dot {
      animation: pulse-green 1.8s ease-in-out infinite;
    }

    /* Player count bar fill animation */
    @keyframes fill-bar {
      from { width: 0%; }
      to { width: var(--fill-width); }
    }
    .bar-fill {
      animation: fill-bar 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
    }

    /* Card glow */
    .card-glow {
      box-shadow:
        0 0 0 1px rgba(93,158,63,0.4),
        0 8px 32px rgba(0,0,0,0.6),
        0 0 60px rgba(93,158,63,0.08);
    }

    /* Creeper-green accent line */
    .accent-line {
      background: linear-gradient(90deg, #5d9e3f, #7ec850, #5d9e3f);
    }

    @keyframes float-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: float-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.25s; }
    .delay-3 { animation-delay: 0.4s; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- Stars bg -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div id="stars"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-sm sm:max-w-md">

    <!-- Grass top strip -->
    <div class="h-3 rounded-t-2xl accent-line fade-up"></div>

    <!-- Main card -->
    <div class="card-glow rounded-b-2xl overflow-hidden fade-up delay-1" style="background: #1a1a2e;">

      <!-- Header -->
      <div class="dirt-bg px-6 pt-6 pb-5">
        <div class="flex items-start gap-4">
          <!-- Creeper face icon -->
          <div class="flex-shrink-0 w-14 h-14 rounded-lg overflow-hidden" style="image-rendering: pixelated;">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
              <rect width="16" height="16" fill="#5d9e3f"/>
              <!-- Eyes -->
              <rect x="3" y="4" width="3" height="3" fill="#1a1a1a"/>
              <rect x="10" y="4" width="3" height="3" fill="#1a1a1a"/>
              <!-- Mouth -->
              <rect x="5" y="8" width="2" height="2" fill="#1a1a1a"/>
              <rect x="9" y="8" width="2" height="2" fill="#1a1a1a"/>
              <rect x="5" y="10" width="6" height="1" fill="#1a1a1a"/>
              <rect x="4" y="11" width="2" height="2" fill="#1a1a1a"/>
              <rect x="10" y="11" width="2" height="2" fill="#1a1a1a"/>
            </svg>
          </div>
          <div>
            <p class="text-xs text-green-400/60 uppercase tracking-widest mb-1">Minecraft Server</p>
            <h1 id="server-name" class="pixel-font text-green-300 text-sm sm:text-base leading-tight">Loading…</h1>
          </div>
        </div>
      </div>

      <!-- Body -->
      <div class="px-6 py-6 space-y-5 fade-up delay-2">

        <!-- Status row -->
        <div class="flex items-center justify-between">
          <span class="text-gray-400 text-sm">Status</span>
          <div id="status-badge" class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-gray-500"></span>
            <span class="text-sm font-semibold text-gray-400">Memeriksa…</span>
          </div>
        </div>

        <!-- Divider -->
        <div class="h-px bg-white/5"></div>

        <!-- Player count -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <span class="text-gray-400 text-sm">Pemain Online</span>
            <div class="text-right">
              <span id="player-count" class="pixel-font text-xl text-green-300">–</span>
              <span class="text-gray-500 text-xs mx-1">/</span>
              <span id="max-players" class="text-gray-500 text-sm">–</span>
            </div>
          </div>

          <!-- Progress bar -->
          <div class="h-3 rounded-full overflow-hidden" style="background: rgba(255,255,255,0.06);">
            <div
              id="player-bar"
              class="bar-fill h-full rounded-full"
              style="--fill-width: 0%; width: 0%; background: linear-gradient(90deg, #5d9e3f, #7ec850);"
            ></div>
          </div>
        </div>

        <!-- Divider -->
        <div class="h-px bg-white/5"></div>

        <!-- Address & version -->
        <div class="grid grid-cols-2 gap-4 fade-up delay-3">
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Versi</p>
            <p id="version" class="text-sm text-gray-300 font-medium">–</p>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Uptime</p>
            <p id="uptime" class="text-sm text-gray-300 font-medium">–</p>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="px-6 pb-5">
        <p id="last-check" class="text-xs text-gray-600 text-center">Memuat data…</p>
      </div>

    </div>
  </div>

  <script>
    // ── Tiny star field ──────────────────────────────────────────
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      const size = Math.random() < 0.2 ? 2 : 1;
      s.style.cssText = `
        position:absolute;
        width:${size}px; height:${size}px;
        border-radius:50%;
        background:rgba(255,255,255,${0.2 + Math.random() * 0.5});
        top:${Math.random() * 100}%;
        left:${Math.random() * 100}%;
        animation: twinkle ${2 + Math.random() * 4}s ease-in-out infinite alternate;
        animation-delay: ${Math.random() * 4}s;
      `;
      starsEl.appendChild(s);
    }
    const twinkleStyle = document.createElement('style');
    twinkleStyle.textContent = '@keyframes twinkle { from{opacity:.1} to{opacity:.9} }';
    document.head.appendChild(twinkleStyle);

    // ── Fetch server data ────────────────────────────────────────
    const API = 'https://minecraft-mp.com/api/?object=servers&element=detail&key=h6vLBURDQAbLHA6GEwBKbHQQzPL3GtSI9Jj';

    async function loadServer() {
      try {
        const res = await fetch(API);
        const d = await res.json();

        document.getElementById('server-name').textContent = d.name || 'Unknown';
        document.getElementById('version').textContent = d.version ? `v${d.version}` : '–';
        document.getElementById('uptime').textContent = d.uptime != null ? `${d.uptime}%` : '–';
        document.getElementById('last-check').textContent = d.last_check ? `Dicek: ${d.last_check}` : '';

        const players = parseInt(d.players) || 0;
        const maxPlayers = parseInt(d.maxplayers) || 20;
        const pct = maxPlayers > 0 ? Math.min((players / maxPlayers) * 100, 100) : 0;

        document.getElementById('player-count').textContent = players;
        document.getElementById('max-players').textContent = maxPlayers;

        const bar = document.getElementById('player-bar');
        bar.style.setProperty('--fill-width', `${pct}%`);
        // Re-trigger animation
        bar.style.animation = 'none';
        bar.offsetHeight; // reflow
        bar.style.animation = '';

        // Status badge
        const badge = document.getElementById('status-badge');
        const isOnline = d.is_online === '1' || d.is_online === 1;
        badge.innerHTML = isOnline
          ? `<span class="pulse-dot w-2.5 h-2.5 rounded-full bg-green-400"></span>
             <span class="text-sm font-semibold text-green-400">Online</span>`
          : `<span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
             <span class="text-sm font-semibold text-red-400">Offline</span>`;

      } catch (err) {
        document.getElementById('server-name').textContent = 'Gagal memuat';
        document.getElementById('last-check').textContent = 'Tidak dapat terhubung ke API.';
        console.error(err);
      }
    }

    loadServer();
    // Auto-refresh setiap 60 detik
    setInterval(loadServer, 60_000);
  </script>
</body>
</html>
